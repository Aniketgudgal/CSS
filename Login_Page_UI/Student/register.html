<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Student</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container">
      <div class="row mt-3 mb-3">
        <div class="row p-3"><h1 class="text-center">Register Student</h1></div>
        <div class="row">
          <form action="" name="fm" method="">
            <div class="row mb-3">
              <div class="col-6"><label for="name">Name</label></div>
              <div class="col-6">
                <label for="Email">Email Address</label>
              </div>
            </div>
            <div class="row mb-3">
              <div class="col-6">
                <input type="text" class="w-50 form-control" name="name" />
              </div>
              <div class="col-6">
                <input type="email" class="w-50 form-control" name="email" />
              </div>
            </div>
            <div class="row mb-3">
              <div class="col-6"><label for="Mobile">Mobile Number</label></div>
              <div class="col-6"><label for="course">Course</label></div>
            </div>
            <div class="row m-3">
              <div class="col-6 p-0">
                <input
                  type="number"
                  autocomplete="off"
                  class="w-50 form-control"
                />
              </div>
              <div class="col-6">
                <select
                  class="form-select w-50"
                  aria-label="Default select example"
                >
                  <option selected>Course Name</option>
                  <option value="1">One</option>
                  <option value="2">Two</option>
                  <option value="3">Three</option>
                </select>
              </div>
            </div>
            <div class="row mb-3">
              <div class="col-6"><label for="username">User Name</label></div>
              <div class="col-6"><label for="password">Password</label></div>
            </div>
            <div class="row mb-3">
              <div class="col-6">
                <input type="text" class="form-control w-50" name="username" />
              </div>
              <div class="col-6">
                <input type="text" class="form-control w-50" name="password" />
              </div>
            </div>
          </form>
        </div>
        <div class="row">
          <button class="mx-auto btn btn-primary w-50">Register</button>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
