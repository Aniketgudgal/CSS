<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="demo-login-boostrap.css" />
  </head>
  <body>
    <div
      class="container p-2 vh-100 d-flex justify-content-center align-items-center"
    >
      <form
        style="border: none"
        class="form-control border-none p-0"
        action="login"
        method="POST"
      >
        <div class="container w-50 h-50 p-0 shadow">
          <div class="row">
            <div
              class="col-12 p-1 text-center bg-primary text-white rounded-top"
            >
              <h2>User Login</h2>
            </div>
          </div>
          <div class="row bg-light rounded-end">
            <div class="row">
              <input
                type="email"
                name="email"
                class="mx-auto w-75 m-4 h-50 form-control"
                placeholder="Username"
                autocomplete="off"
              />
            </div>
            <div class="row">
              <input
                type="password"
                name="password"
                class="w-75 mx-auto m-4 h-50 form-control"
                placeholder="Password"
                autocomplete="off"
              />
            </div>
            <div class="row d-flex rounded-end">
              <div class="col-6 d-flex justify-content-center">
                <input
                  type="submit"
                  name="submit"
                  class="mx-auto m-4 mb-4 w-75 btn bg-primary text-white form-control"
                  value="Login"
                />
              </div>
              <div class="col-6 d-flex justify-content-center">
                <a
                  class="mx-auto btn text-center m-4 bg-primary w-75 text-white mb-4"
                  href="Register.html"
                  >Register</a
                >
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
